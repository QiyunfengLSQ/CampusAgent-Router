<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户端 - CampusAgent Router</title>
  <link rel="icon" href="web/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="web/styles.css">
</head>
<body>
  <main class="shell app-shell">
    <nav class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="web/logo.svg" alt=""></span>
        <span>用户端</span>
      </a>
      <div class="nav-actions">
        <a class="ghost-link" href="admin.html">管理端</a>
      </div>
    </nav>

    <section class="workspace">
      <aside class="quick-panel">
        <h2>快捷场景</h2>
        <button class="sample active" data-text="帮我查一下最近的 AI 新闻">实时搜索</button>
        <button class="sample" data-text="根据我上传的资料回答这个问题">本地资料问答</button>
        <button class="sample" data-text="帮我总结一下这篇文章">文本总结</button>
        <button class="sample" data-text="修复这个 Python 报错">代码助手</button>
        <button class="sample" data-text="明天早上八点提醒我背单词">提醒日程</button>
        <button class="sample" data-text="把这句话翻译成英文">翻译改写</button>
        <button class="sample" data-text="陪我聊一会儿">普通聊天</button>
      </aside>

      <section class="console-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Router Console</p>
            <h1>输入一句话，获得意图和工具路由</h1>
          </div>
          <span id="modeBadge" class="status-badge">静态演示</span>
        </div>

        <textarea id="queryInput" rows="4" placeholder="例如：帮我查一下最近的 AI 新闻">帮我查一下最近的 AI 新闻</textarea>
        <div class="context-tools">
          <div>
            <label for="contextInput">资料 / 正文 / 代码区</label>
            <p>用于本地资料问答、总结、翻译和代码修复。也可以上传 txt 或 md 文件。</p>
          </div>
          <input id="fileInput" type="file" accept=".txt,.md,.csv,.json">
        </div>
        <textarea id="contextInput" rows="6" placeholder="可选：粘贴文章、笔记、PDF 复制文本、代码或报错信息。"></textarea>
        <div class="control-row">
          <button id="routeBtn" class="primary-button">执行任务</button>
          <button id="clearBtn" class="secondary-button">清空</button>
        </div>

        <div class="result-grid">
          <div class="result-main">
            <span>Intent</span>
            <strong id="intentText">search</strong>
          </div>
          <div class="result-main">
            <span>Route To</span>
            <strong id="routeText">web_search</strong>
          </div>
        </div>

        <div class="reason-box" id="reasonText">用户需要获取实时外部信息。</div>
        <section class="execution-panel">
          <div class="execution-head">
            <span>执行结果</span>
            <b id="executionStatus">ready</b>
          </div>
          <div id="answerText" class="answer-box">点击“执行任务”后，这里会显示真实工具执行结果。</div>
          <div id="actionList" class="action-list"></div>
        </section>
      </section>
    </section>
  </main>
  <script src="web/app.js"></script>
</body>
</html>
