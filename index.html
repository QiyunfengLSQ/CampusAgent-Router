<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CampusAgent Router</title>
  <link rel="stylesheet" href="web/styles.css">
</head>
<body>
  <main class="shell landing">
    <nav class="topbar">
      <div class="brand">
        <span class="brand-mark">CA</span>
        <span>CampusAgent Router</span>
      </div>
      <div class="nav-actions">
        <a class="ghost-link" href="admin.html">管理端</a>
        <a class="primary-link" href="user.html">进入用户端</a>
      </div>
    </nav>

    <section class="hero-grid">
      <div class="hero-copy">
        <p class="eyebrow">AI Agent Intent Router</p>
        <h1>把一句自然语言请求，路由到正确的 Agent 工具。</h1>
        <p class="hero-text">
          面向学习、办公和生活助手的轻量级意图识别系统，支持搜索、RAG 问答、总结、代码、提醒、翻译和闲聊七类任务。
        </p>
        <div class="hero-actions">
          <a class="primary-link large" href="user.html">开始体验</a>
          <a class="ghost-link large" href="admin.html">查看管理端</a>
        </div>
      </div>

      <div class="signal-board" aria-label="router preview">
        <div class="scanline"></div>
        <div class="chip-row">
          <span>query</span>
          <strong>帮我查一下最近的 AI 新闻</strong>
        </div>
        <div class="route-flow">
          <span>Intent</span>
          <b>search</b>
          <i></i>
          <span>Tool</span>
          <b>web_search</b>
        </div>
        <div class="meter">
          <span style="width:96%"></span>
        </div>
        <p>confidence 0.96</p>
      </div>
    </section>
  </main>
</body>
</html>
