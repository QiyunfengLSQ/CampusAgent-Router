<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CampusAgent Router</title>
  <link rel="icon" href="web/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="web/styles.css">
</head>
<body>
  <main class="shell landing">
    <nav class="topbar">
      <div class="brand">
        <span class="brand-mark"><img src="web/logo.svg" alt=""></span>
        <span>CampusAgent Router</span>
      </div>
      <div class="nav-actions">
        <a class="ghost-link" href="admin.html">管理端</a>
        <a class="primary-link" href="user.html">进入用户端</a>
      </div>
    </nav>

    <section class="hero-grid">
      <div class="hero-copy">
        <p class="eyebrow">校园助手</p>
        <h1>输入一句话，自动判断并处理你的任务。</h1>
        <p class="hero-text">
          支持搜索资料、总结文本、翻译内容、设置提醒、处理代码和基于资料问答。网页可直接打开，也可以连接本地后端获得更完整的结果。
        </p>
        <div class="hero-actions">
          <a class="primary-link large" href="user.html">开始体验</a>
          <a class="ghost-link large" href="admin.html">查看管理端</a>
        </div>
      </div>

      <div class="signal-board" aria-label="任务处理示例">
        <div class="scanline"></div>
        <div class="chip-row">
          <span>输入</span>
          <strong>帮我查一下最近的 AI 新闻</strong>
        </div>
        <div class="route-flow">
          <span>任务类型</span>
          <b>搜索资料</b>
          <i></i>
          <span>执行方式</span>
          <b>打开搜索入口</b>
        </div>
        <div class="meter">
          <span style="width:96%"></span>
        </div>
        <p>已准备好执行</p>
      </div>
    </section>
  </main>
</body>
</html>
